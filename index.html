<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <title>Whiteboard</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <canvas id="board"></canvas>

    <div id="toolbar" role="toolbar" aria-label="Whiteboard tools">
      <div class="group group-color" role="group" aria-label="Color">
        <button id="color-trigger" class="color-trigger" title="Color" aria-haspopup="true" aria-expanded="false">
          <span id="color-indicator"></span>
        </button>
      </div>

      <div class="group" role="group" aria-label="Size">
        <label>Size <input id="size" type="range" min="1" max="40" value="3" /></label>
      </div>

      <div class="group" role="group" aria-label="Actions">
        <button type="button" id="undo" title="Undo (Ctrl+Z)" aria-label="Undo">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M3 7v6h6"/>
            <path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6.7 2.7L3 13"/>
          </svg>
        </button>
        <button type="button" id="theme-toggle" title="Toggle dark mode" aria-label="Toggle dark mode">
          <svg class="icon-moon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
          <svg class="icon-sun" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="4"/>
            <path d="M12 2v2"/>
            <path d="M12 20v2"/>
            <path d="m4.93 4.93 1.41 1.41"/>
            <path d="m17.66 17.66 1.41 1.41"/>
            <path d="M2 12h2"/>
            <path d="M20 12h2"/>
            <path d="m6.34 17.66-1.41 1.41"/>
            <path d="m19.07 4.93-1.41 1.41"/>
          </svg>
        </button>
        <button type="button" id="export" title="Export as PNG">PNG</button>
      </div>
    </div>

    <div id="hint">Scroll or pinch to zoom</div>

    <div id="color-popover" class="popover" hidden>
      <button class="swatch active" data-color="#111111" title="Black"></button>
      <button class="swatch" data-color="#e11d48" title="Red"></button>
      <button class="swatch" data-color="#2563eb" title="Blue"></button>
      <button class="swatch" data-color="#16a34a" title="Green"></button>
      <button class="swatch" data-color="#f59e0b" title="Orange"></button>
    </div>

    <script src="app.js"></script>
  </body>
</html>
